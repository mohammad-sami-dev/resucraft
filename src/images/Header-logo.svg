<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 140" width="420" height="140">

  <!-- Document icon -->
  <g transform="translate(8, 8)">
    <!-- Document body -->
    <rect x="0" y="0" width="52" height="64" rx="5" fill="#1e2d5e"/>
    <rect x="6" y="8" width="40" height="48" rx="3" fill="#2a3f8f"/>
    <!-- Text lines -->
    <rect x="12" y="16" width="28" height="3" rx="1.5" fill="#ffffff" opacity="0.9"/>
    <rect x="12" y="24" width="22" height="3" rx="1.5" fill="#ffffff" opacity="0.7"/>
    <rect x="12" y="32" width="25" height="3" rx="1.5" fill="#ffffff" opacity="0.7"/>
    <rect x="12" y="40" width="18" height="3" rx="1.5" fill="#ffffff" opacity="0.5"/>
    <!-- Folded corner -->
    <polygon points="40,0 52,0 52,12" fill="#4f8ef7"/>
    <polygon points="40,0 52,12 40,12" fill="#3a6dd4"/>
    <!-- Pencil -->
    <rect x="28" y="46" width="16" height="22" rx="3" fill="#f59e0b"/>
    <rect x="30" y="42" width="12" height="7" rx="2.5" fill="#fbbf24"/>
    <ellipse cx="36" cy="68" rx="5" ry="3" fill="#f59e0b" opacity="0.55"/>
    <line x1="36" y1="50" x2="30" y2="65" stroke="#1e2d5e" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="30" y1="65" x2="42" y2="65" stroke="#1e2d5e" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- Brand name -->
  <text x="70" y="42" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="#ffffff" letter-spacing="0.5">Resu</text>
  <text x="70" y="74" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="#4f46e5" letter-spacing="0.5">Craft</text>

  <!-- Tagline -->
  <text x="70" y="90" font-family="Arial, Helvetica, sans-serif" font-size="8.5" font-weight="600" fill="#ffffff" letter-spacing="2.5" opacity="0.9">PRECISION RESUME BUILDER</text>

</svg>
